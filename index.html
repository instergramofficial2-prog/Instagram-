<!DOCTYPE html>
<html>
<head>
  <title>Insta X</title>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fafafa;
    }

    .logo {
      font-family: 'Grand Hotel', cursive;
      font-size: 45px;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      margin-top: 50px;
    }

    .box {
      background: white;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      background: #0095f6;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .post {
      background: white;
      border: 1px solid #ddd;
      margin-top: 20px;
    }

    .post img {
      width: 100%;
    }

    .like {
      padding: 10px;
      cursor: pointer;
    }

    #home, #login, #feed, #loading {
      display: none;
    }
  </style>
</head>
<body>

<!-- HOME PAGE -->
<div id="home" class="container">
  <div class="logo">Insta X</div>
  <div class="box">
    <button onclick="showLogin()">Log In</button>
    <button onclick="showLogin()">Sign Up</button>
  </div>
</div>

<!-- LOGIN PAGE -->
<div id="login" class="container">
  <div class="logo">Insta X</div>
  <div class="box">
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Enter</button>
    <button onclick="signup()">Sign Up</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="logo">Loading...</div>

<!-- FEED -->
<div id="feed" class="container">
  <div class="logo">Insta X</div>
  <div id="posts">
    <!-- Posts will appear here -->
  </div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Show home page initially
  document.getElementById("home").style.display = "block";

  function showLogin() {
    document.getElementById("home").style.display = "none";
    document.getElementById("login").style.display = "block";
  }

  // SIGN UP
  function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(email === "" || password === "") { alert("Fill all fields"); return; }

    auth.createUserWithEmailAndPassword(email, password)
      .then(userCredential => {
        alert("Account created ✅");
      })
      .catch(error => alert(error.message));
  }

  // LOGIN
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(email === "" || password === "") { alert("Fill all fields"); return; }

    document.getElementById("login").style.display = "none";
    document.getElementById("loading").style.display = "block";

    auth.signInWithEmailAndPassword(email, password)
      .then(userCredential => {
        document.getElementById("loading").style.display = "none";
        showFeed();
      })
      .catch(error => {
        alert(error.message);
        document.getElementById("loading").style.display = "none";
        document.getElementById("login").style.display = "block";
      });
  }

  function showFeed() {
    document.getElementById("feed").style.display = "block";

    // Example feed posts
    const postsDiv = document.getElementById("posts");
    const examplePosts = [
      "https://picsum.photos/400/300",
      "https://picsum.photos/400/301",
      "https://picsum.photos/400/302"
    ];

    examplePosts.forEach(url => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `<img src="${url}"><div class="like" onclick="like(this)">❤️ Like</div>`;
      postsDiv.appendChild(div);
    });
  }

  function like(btn) {
    btn.innerHTML = "❤️ Liked";
  }

</script>
</body>
</html>
