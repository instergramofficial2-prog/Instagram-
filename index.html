 <!DOCTYPE html>
<html>
<head>
  <title>Insta X</title>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:Arial; background:#fafafa; }
    .logo { font-family:'Grand Hotel',cursive; font-size:45px; text-align:center; padding:20px; }
    .container { max-width:400px; margin:auto; margin-top:50px; }
    .box { background:white; padding:20px; border:1px solid #ddd; border-radius:10px; text-align:center; }
    input { width:90%; padding:10px; margin:5px; border:1px solid #ccc; border-radius:5px; }
    button { width:95%; padding:10px; background:#0095f6; color:white; border:none; margin-top:10px; cursor:pointer; border-radius:5px; }
    .post { background:white; border:1px solid #ddd; margin-top:20px; }
    .post img { width:100%; }
    .like { padding:10px; cursor:pointer; }
    #home,#login,#feed,#loading { display:none; }
  </style>
</head>

<body>

<div id="home" class="container">
  <div class="logo">Insta X</div>
  <div class="box">
    <button onclick="showLogin()">Log In</button>
    <button onclick="showLogin()">Sign Up</button>
  </div>
</div>

<div id="login" class="container">
  <div class="logo">Insta X</div>
  <div class="box">
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Log In</button>
  </div>
</div>

<div id="loading" class="logo">Loading...</div>

<div id="feed" class="container">
  <div class="logo">Insta X</div>

  <div class="post">
    <img src="https://picsum.photos/400/300">
    <div class="like" onclick="like(this)">❤️ Like</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  // 🔥 REPLACE THESE AFTER YOU CREATE SUPABASE PROJECT
  const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
  const SUPABASE_KEY = "YOUR_PUBLIC_KEY";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById("home").style.display = "block";

  function showLogin() {
    document.getElementById("home").style.display = "none";
    document.getElementById("login").style.display = "block";
  }

  async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({ email, password });

    if (error) {
      alert(error.message);
    } else {
      alert("Account created ✅");
    }
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    document.getElementById("login").style.display = "none";
    document.getElementById("loading").style.display = "block";

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      alert(error.message);
      document.getElementById("loading").style.display = "none";
      document.getElementById("login").style.display = "block";
    } else {
      document.getElementById("loading").style.display = "none";
      document.getElementById("feed").style.display = "block";
    }
  }

  function like(btn) {
    btn.innerHTML = "❤️ Liked";
  }
</script>

</body>
</html>
