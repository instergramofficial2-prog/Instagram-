<!DOCTYPE html>
<html>
<head>
  <title>Instagram</title>
  <!-- Slanted font like Instagram -->
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#fafafa;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-container {
      background:white;
      border:1px solid #ddd;
      border-radius:8px;
      padding:40px 30px;
      width:350px;
      text-align:center;
    }

    .logo {
      font-family:'Grand Hotel', cursive;
      font-size:50px;
      margin-bottom:20px;
    }

    input {
      width:90%;
      padding:10px;
      margin:5px 0;
      border:1px solid #ddd;
      border-radius:5px;
      font-size:14px;
    }

    button {
      width:95%;
      padding:10px;
      margin-top:10px;
      background:#0095f6;
      color:white;
      border:none;
      border-radius:5px;
      font-weight:bold;
      cursor:pointer;
    }

    .forgot, .signup {
      font-size:12px;
      color:#00376b;
      margin-top:10px;
      display:block;
      cursor:pointer;
      text-decoration:none;
    }

    .separator {
      display:flex;
      align-items:center;
      text-align:center;
      margin:15px 0;
    }

    .separator::before, .separator::after {
      content:"";
      flex:1;
      border-bottom:1px solid #ddd;
    }

    .separator:not(:empty)::before {
      margin-right:.75em;
    }

    .separator:not(:empty)::after {
      margin-left:.75em;
    }

  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">Instagram</div>
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Log In</button>

    <a class="forgot">Forgot password?</a>

    <div class="separator">OR</div>

    <button style="background:#385185;">Log in with Facebook</button>

    <a class="signup">Don't have an account? Sign Up</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.6.0/dist/supabase.min.js"></script>

  <script>
    // 🔥 Replace these with your Supabase project details
    const SUPABASE_URL = "YOUR_SUPABASE_URL_HERE";
    const SUPABASE_KEY = "YOUR_SUPABASE_PUBLIC_ANON_KEY_HERE";

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if(!email || !password){
        alert("Please fill all fields");
        return;
      }

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) throw error;
        alert("Logged in successfully!"); // Replace with redirect to feed
      } catch(err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
